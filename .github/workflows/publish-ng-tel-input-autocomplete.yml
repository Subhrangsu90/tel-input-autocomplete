name: Publish ng-tel-input-autocomplete

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b385d89487c6778f237f8f65922 # v4.2.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run test:lib
      - run: npm run build:lib
      - run: npm publish ./dist/ng-tel-input-autocomplete --access public --provenance
